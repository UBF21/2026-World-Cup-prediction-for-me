<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#07111C"/>

  <!-- Spain flag stripe (top accent) -->
  <rect x="0" y="0" width="64" height="3" rx="0" fill="#AA151B"/>
  <rect x="0" y="3" width="64" height="2.5" fill="#F1BF00"/>
  <rect x="0" y="5.5" width="64" height="3" fill="#AA151B"/>

  <!-- Trophy cup body -->
  <path d="M22 14 h20 l-3 18 H25 Z" fill="#F6C544"/>

  <!-- Trophy handles -->
  <path d="M22 17 Q14 17 14 24 Q14 30 22 30" fill="none" stroke="#F6C544" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M42 17 Q50 17 50 24 Q50 30 42 30" fill="none" stroke="#F6C544" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Trophy stem -->
  <rect x="28" y="32" width="8" height="5" fill="#F6C544"/>

  <!-- Trophy base -->
  <rect x="22" y="37" width="20" height="4" rx="2" fill="#F6C544"/>

  <!-- Trophy base bottom line -->
  <rect x="20" y="41" width="24" height="2.5" rx="1.2" fill="#F6C544" opacity="0.7"/>

  <!-- Shine on cup -->
  <path d="M27 17 Q28 22 27 27" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Star above cup -->
  <text x="32" y="13" text-anchor="middle" font-size="7" fill="#F6C544" font-family="Arial">★</text>

  <!-- 2026 text -->
  <text x="32" y="57" text-anchor="middle" font-size="7" fill="#4A6B82" font-family="Arial, sans-serif" font-weight="700" letter-spacing="0.5">2026</text>
</svg>
