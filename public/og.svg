<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="25%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1FE08C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1FE08C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F6C544" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F6C544" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#07111C"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Spain flag stripe top -->
  <rect x="0" y="0" width="1200" height="7" fill="#AA151B"/>
  <rect x="0" y="7" width="1200" height="5" fill="#F1BF00"/>
  <rect x="0" y="12" width="1200" height="7" fill="#AA151B"/>

  <!-- Left accent line -->
  <rect x="72" y="70" width="3" height="180" fill="#F6C544" rx="2"/>

  <!-- Eyebrow text -->
  <text x="92" y="97" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#F6C544" letter-spacing="3" text-transform="uppercase">CAMPEÓN PRONOSTICADO · MUNDIAL FIFA 2026</text>

  <!-- ESPAÑA main title -->
  <text x="84" y="265" font-family="Impact, Arial Black, sans-serif" font-size="185" fill="#F6C544" letter-spacing="-4">ESPAÑA</text>

  <!-- Divider line -->
  <rect x="84" y="285" width="580" height="2" fill="rgba(246,197,68,0.3)" rx="1"/>

  <!-- Final result -->
  <text x="84" y="325" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.75)" letter-spacing="1">FINAL · 19 JULIO · METLIFE STADIUM</text>
  <text x="84" y="365" font-family="Impact, Arial Black, sans-serif" font-size="42" fill="white" letter-spacing="2">España 2 – 1 Francia</text>

  <!-- Stats row -->
  <text x="84" y="420" font-family="Courier New, monospace" font-size="16" fill="#1FE08C" letter-spacing="1">16.1% probabilidad · 25.000 simulaciones · by Felipe Rafael Montenegro</text>

  <!-- Trophy -->
  <text x="900" y="360" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif" font-size="220">🏆</text>

  <!-- Bottom bar -->
  <rect x="0" y="605" width="1200" height="25" fill="#0D1E2E"/>
  <text x="84" y="621" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="1">PREDICCIÓN COMPLETA · 104 PARTIDOS · GRUPOS · BRACKET · METODOLOGÍA</text>
</svg>
